<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Your Look | Évara</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <style>
        .match-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 80vh;
            gap: var(--spacing-xl);
            margin-top: var(--spacing-xl);
        }

        .outfit-display {
            background: white;
            padding: var(--spacing-lg);
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .outfit-image-wrapper {
            width: 100%;
            height: 500px;
            overflow: hidden;
            background: var(--bg-primary);
            margin-bottom: var(--spacing-md);
        }

        #outfit-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition-smooth);
        }

        .recommendations {
            padding: var(--spacing-lg);
        }

        .preset-selector {
            display: flex;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-lg);
        }

        .preset-chip {
            padding: 0.5rem 1.5rem;
            border: 1px solid #eee;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .preset-chip.active {
            background: var(--text-primary);
            color: white;
            border-color: var(--text-primary);
        }

        .bag-suggestion {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-md);
            padding: var(--spacing-sm);
            background: white;
            border: 1px solid transparent;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .bag-suggestion:hover {
            border-color: #eee;
            transform: translateX(10px);
        }

        .bag-suggestion img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            background: var(--bg-ivory);
        }

        .bag-info h4 {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .bag-info p {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .upload-area {
            margin-top: var(--spacing-md);
            text-align: center;
        }

        #outfit-upload {
            display: none;
        }

        .upload-label {
            font-size: 0.9rem;
            text-decoration: underline;
            cursor: pointer;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>

    <header style="mix-blend-mode: normal; color: var(--text-primary);">
        <div class="container">
            <nav>
                <a href="index.html" class="logo">Évara</a>
                <ul class="nav-links">
                    <li><a href="collection.html">Collections</a></li>
                    <li><a href="studio.html">Studio</a></li>
                    <li><a href="match.html">Match</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section style="padding-top: var(--spacing-lg);">
            <h1 style="font-size: 3rem; text-align: center; margin-bottom: var(--spacing-sm);">The Perfect Match</h1>
            <p style="text-align: center; color: var(--text-secondary); font-style: italic;">Let us suggest a companion
                for your journey.</p>

            <div class="match-container">
                <div class="outfit-display">
                    <div class="outfit-image-wrapper">
                        <img id="outfit-preview"
                            src="https://images.unsplash.com/photo-1548624149-f9b1859aa7d0?auto=format&fit=crop&q=80&w=1000"
                            alt="Outfit Preview">
                    </div>
                    <div class="preset-selector">
                        <div class="preset-chip active" data-style="office">Office</div>
                        <div class="preset-chip" data-style="casual">Casual</div>
                        <div class="preset-chip" data-style="party">Party</div>
                        <div class="preset-chip" data-style="travel">Travel</div>
                    </div>
                    <div class="upload-area">
                        <label for="outfit-upload" class="upload-label">Or upload your own story (outfit photo)</label>
                        <input type="file" id="outfit-upload" accept="image/*">
                    </div>
                </div>

                <div class="recommendations">
                    <h2 style="margin-bottom: var(--spacing-md);">Suggested Silhouettes</h2>
                    <div id="suggestions-list">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer style="margin-top: var(--spacing-xl);">
        <div class="container">
            <div class="footer-logo">Évara</div>
            <p class="copyright">&copy; 2026 ÉVARA ATELIER</p>
        </div>
    </footer>

    <script src="js/match.js"></script>
</body>

</html>
